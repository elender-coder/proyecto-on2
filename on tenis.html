    <style>
        /* Mantenemos tu bloque de estilo original */
        .menu-colores button {
            transition: 0.3s;
        }
        
        /* Ajuste para que el link de "Siguiente" se vea centrado */
        .pagination-link {
            display: block;
            text-align: center;
            padding: 20px;
            text-decoration: none;
            color: black;
        }
        
        .product {
            transition: transform 0.3s;
        }
        
        .product:hover {
            transform: translateY(-5px);
        }
    </style>

    <script>
    /* Tu lógica de filtrado intacta */
    function mostrarColor(color){
      let productos = document.querySelectorAll(".product");

      productos.forEach(p=>{
        if(p.classList.contains(color)){
          p.style.display="block";
        } else {
          p.style.display="none";
        }
      });
    }
    </script>
